name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'docs.json'
      - 'snippets/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Mintlify CLI
        run: npm install @mintlify/cli@4 --save-dev

      - name: Build Static Site
        run: |
          npx mintlify export
          unzip -q export.zip -d static_site

      - name: Deploy to fun123dotcn.github.io
        env:
          GH_TOKEN: ${{ secrets.FUN123_GH_TOKEN }}
        run: |
          cd static_site
          git init
          git config user.name "ai2claw"
          git config user.email "ai2claw@fun123.cn"
          git add .
          git commit -m "自动部署: $(date '+%Y-%m-%d %H:%M')"
          git branch -M main
          git remote add origin https://x-access-token:${GH_TOKEN}@github.com/fun123dotcn/fun123dotcn.github.io.git
          git push -u origin main --force

      - name: Notify Success
        run: |
          echo "✅ 部署成功！"
          echo "访问: https://fun123dotcn.github.io/"
