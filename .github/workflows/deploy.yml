name: Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'docs.json'
      - 'snippets/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Mintlify CLI
        run: npm install @mintlify/cli@4 --save-dev

      - name: Build Static Site
        run: |
          npx mintlify export
          unzip -q export.zip -d static_site

      # Mintlify 导出不支持 baseUrl，构建后修正所有 HTML 中的路径前缀
      # 关键原则：静态资源（_next/logo/favicon）位于 GitHub Pages 根目录，不需要 /ai2-docs/ 前缀
      #          内容页面（content）位于 /ai2-docs/content/ 目录下，需要 /ai2-docs/ 前缀
      - name: Fix Base URL for /ai2-docs/ subdirectory
        run: |
          # 1. 修正 <base> 标签
          find static_site -name "*.html" -exec sed -i 's|<base href="/">|<base href="/ai2-docs/">|g' {} \;

          # 2. 修正内容页面路径（content 在 /ai2-docs/ 目录下）
          find static_site -name "*.html" -exec sed -i 's|href="/content"|href="/ai2-docs/content"|g' {} \;
          find static_site -name "*.html" -exec sed -i 's|href="/content/"|href="/ai2-docs/content/"|g' {} \;
          find static_site -name "*.html" -exec sed -i 's|src="/content/|src="/ai2-docs/content/|g' {} \;

          # 3. 修正 sitemap（sitemap.xml 实际在 /ai2-docs/ 目录下）
          find static_site -name "*.html" -exec sed -i 's|href="/sitemap.xml"|href="/ai2-docs/sitemap.xml"|g' {} \;

          echo "Base URL fixed - only content paths prefixed with /ai2-docs/"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: static_site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
