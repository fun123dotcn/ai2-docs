name: Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'docs.json'
      - 'snippets/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Mintlify CLI
        run: npm install @mintlify/cli@4 --save-dev

      - name: Build Static Site
        run: |
          npx mintlify export
          unzip -q export.zip -d static_site

      - name: Fix Base URL for /ai2-docs/ subdirectory
        run: |
          # 在每个HTML文件的<base href="/">改为<base href="/ai2-docs/">
          find static_site -name "*.html" -exec sed -i 's|<base href="/">|<base href="/ai2-docs/">|g' {} \;
          # 修复_next和content路径
          find static_site -name "*.html" -exec sed -i 's|href="/_next/|href="/ai2-docs/_next/|g' {} \;
          find static_site -name "*.html" -exec sed -i 's|src="/_next/|src="/ai2-docs/_next/|g' {} \;
          find static_site -name "*.html" -exec sed -i 's|href="/content/|href="/ai2-docs/content/|g' {} \;
          find static_site -name "*.html" -exec sed -i 's|src="/content/|src="/ai2-docs/content/|g' {} \;
          echo "Base URL fixed"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: static_site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
